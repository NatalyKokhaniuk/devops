services:
  rest-api:
    build:
      context: ./rest-api
    environment:
      PORT: 3000
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-test-key}
      EXCHANGE_API: ${EXCHANGE_API:-https://open.er-api.com/v6/latest/USD}
    ports:
      - "3000:3000"

  nlp-service:
    build:
      context: ./nlp-service
    environment:
      PORT: 5000
    ports:
      - "5000:5000"

  telegram-bot:
    build:
      context: ./telegram-bot
    depends_on:
      - rest-api
      - nlp-service
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      API_URL: http://rest-api:3000
      NLP_URL: http://nlp-service:5000
    volumes:
      - telegram_db:/app/database

volumes:
  telegram_db:
